<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GhostBrowser</title>

<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script src="/baremux/index.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<style>
*{
  box-sizing:border-box;
  font-family:Inter,system-ui;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:
  radial-gradient(circle at top,#1a1a1a,#050505 60%);
  color:#fff;
}

/* ===== TOP BAR ===== */

.browser-ui{
  height:96px;
  background:rgba(10,10,10,.78);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;
  flex-direction:column;
  z-index:100;
  position:relative;
}

/* ===== TABS ===== */

.tabs{
  height:38px;
  display:flex;
  align-items:center;
  gap:8px;
  padding:0 10px;
  overflow-x:auto;
}

.tabs::-webkit-scrollbar{
  display:none;
}

.tab{
  height:30px;
  min-width:160px;
  max-width:220px;
  padding:0 14px;
  border-radius:10px 10px 0 0;
  background:rgba(255,255,255,.04);
  border:1px solid transparent;
  color:#bbb;
  display:flex;
  align-items:center;
  gap:8px;
  cursor:pointer;
  transition:.25s ease;
}

.tab:hover{
  background:rgba(255,255,255,.06);
}

.tab.active{
  background:rgba(255,255,255,.09);
  border:1px solid rgba(255,255,255,.08);
  color:#fff;
  box-shadow:0 0 25px rgba(255,255,255,.05);
}

.tab span{
  flex:1;
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
  font-size:13px;
}

.tab i{
  opacity:.6;
  transition:.2s;
}

.tab i:hover{
  opacity:1;
  color:#ff6b6b;
}

.newtab{
  width:32px;
  height:32px;
  border-radius:8px;
  border:none;
  background:transparent;
  color:#aaa;
  cursor:pointer;
  transition:.2s;
}

.newtab:hover{
  background:rgba(255,255,255,.08);
  color:#fff;
}

/* ===== NAVBAR ===== */

.navbar{
  height:58px;
  display:flex;
  align-items:center;
  gap:10px;
  padding:0 14px;
}

.navbar button{
  width:36px;
  height:36px;
  border:none;
  border-radius:50%;
  background:transparent;
  color:#aaa;
  cursor:pointer;
  transition:.2s;
}

.navbar button:hover{
  background:rgba(255,255,255,.08);
  color:#fff;
}

/* ===== URL BAR ===== */

.urlbar{
  flex:1;
  height:40px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(12px);
  border-radius:100px;
  padding:0 18px;
  display:flex;
  align-items:center;
}

.urlbar input{
  width:100%;
  height:100%;
  border:none;
  outline:none;
  background:transparent;
  color:#fff;
  font-size:14px;
  text-shadow:0 0 10px rgba(255,255,255,.2);
}

.urlbar input::placeholder{
  color:#888;
}

/* ===== VIEWFRAME ===== */

.viewframe{
  position:absolute;
  top:96px;
  left:0;
  width:100%;
  height:calc(100% - 96px);
  border:none;
  display:none;
  background:#000;
}

.viewframe.active{
  display:block;
}

/* ===== HOMEPAGE ===== */

.ntp{
  position:absolute;
  top:96px;
  left:0;
  width:100%;
  height:calc(100% - 96px);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  pointer-events:none;
}

.ntp h1{
  font-size:52px;
  font-weight:700;
  margin:0;
  letter-spacing:-2px;
  text-shadow:0 0 40px rgba(255,255,255,.18);
}

.ntp p{
  opacity:.6;
  margin-top:12px;
  font-size:15px;
}
</style>
</head>

<body>

<div class="browser-ui">
    <div class="tabs" id="tabs">
        <button class="newtab" id="newtab"><i class="fas fa-plus"></i></button>
    </div>

    <div class="navbar">
        <button id="back"><i class="fas fa-arrow-left"></i></button>
        <button id="forward"><i class="fas fa-arrow-right"></i></button>
        <button id="reload"><i class="fas fa-rotate-right"></i></button>
<select id="engineSelect">
  <option value="google">Google</option>
  <option value="duckduckgo">DuckDuckGo</option>
  <option value="brave">Brave</option>
</select>
        <form class="urlbar" id="form">
            <input id="url" placeholder="Search or enter address">
        </form>

        <button id="popout"><i class="fas fa-external-link"></i></button>
    </div>
</div>

<div class="ntp" id="ntp">
    <h1>GhostBrowser</h1>
</div>

<script>
navigator.serviceWorker?.register("/uv/sw.js")

const connection = new BareMux.BareMuxConnection("/baremux/worker.js")
connection.setTransport("/libcurl/index.mjs", [{ websocket: "wss://wisp.rhw.one/" }])

const tabsEl = document.getElementById("tabs")
const newTabBtn = document.getElementById("newtab")
const urlInput = document.getElementById("url")
const ntp = document.getElementById("ntp")

let tabs = []
let activeId = null
let idCounter = 0

function createTab(url = "") {
    const id = idCounter++

    const iframe = document.createElement("iframe")
    iframe.className = "viewframe"
    iframe.dataset.id = id

    iframe.setAttribute("sandbox",
        "allow-scripts allow-same-origin allow-forms allow-modals allow-popups"
    )

    document.body.appendChild(iframe)

    const tabBtn = document.createElement("div")
    tabBtn.className = "tab"
    tabBtn.dataset.id = id
    tabBtn.innerHTML = `<span>New Tab</span><i class="fas fa-xmark"></i>`

    tabBtn.addEventListener("click", e => {
        if (e.target.tagName === "I") closeTab(id)
        else activateTab(id)
    })

    tabsEl.insertBefore(tabBtn, newTabBtn)

    tabs.push({ id, iframe, tabBtn, history: [], index: -1 })
    activateTab(id)

    if (url) navigate(url)
}

function activateTab(id) {
    activeId = id

    tabs.forEach(t => {
        t.iframe.classList.toggle("active", t.id === id)
        t.tabBtn.classList.toggle("active", t.id === id)
    })

    const tab = getTab()
    if (!tab) return

    if (tab.index >= 0) {
        urlInput.value = tab.history[tab.index]
        ntp.style.display = "none"
    } else {
        urlInput.value = ""
        ntp.style.display = "flex"
    }
}

function closeTab(id) {
    if (tabs.length === 1) return

    const i = tabs.findIndex(t => t.id === id)
    const tab = tabs[i]

    tab.iframe.remove()
    tab.tabBtn.remove()
    tabs.splice(i, 1)

    activateTab(tabs[Math.max(0, i - 1)].id)
}

function normalize(input) {

    const engine = document.getElementById("engineSelect").value

    const engines = {
        google: "https://www.google.com/search?q=",
        duckduckgo: "https://duckduckgo.com/?q=",
        brave: "https://search.brave.com/search?q="
    }

    const isUrl =
        input.startsWith("http://") ||
        input.startsWith("https://") ||
        input.includes(".com") ||
        input.includes(".net") ||
        input.includes(".org") ||
        input.includes(".io")

    if (isUrl) {
        if (!input.startsWith("http")) {
            input = "https://" + input
        }
        return input
    }

    return engines[engine] + encodeURIComponent(input)
}

function navigate(input, push = true) {
    const tab = getTab()
    if (!tab) return

    const url = normalize(input)

    if (push) {
        tab.history = tab.history.slice(0, tab.index + 1)
        tab.history.push(url)
        tab.index++
    }

    tab.iframe.src = __uv$config.prefix + __uv$config.encodeUrl(url)
    urlInput.value = url
    ntp.style.display = "none"

    tab.iframe.onload = () => {
        tab.tabBtn.querySelector("span").textContent =
            tab.iframe.contentDocument?.title || new URL(url).hostname
    }
}

function getTab() {
    return tabs.find(t => t.id === activeId)
}

/* ===== CONTROLS ===== */
back.onclick = () => {
    const t = getTab()
    if (!t || t.index <= 0) return
    t.index--
    navigate(t.history[t.index], false)
}

forward.onclick = () => {
    const t = getTab()
    if (!t || t.index >= t.history.length - 1) return
    t.index++
    navigate(t.history[t.index], false)
}

reload.onclick = () => {
    const t = getTab()
    if (!t) return
    t.iframe.src = t.iframe.src
}

popout.onclick = () => {
    const t = getTab()
    if (!t) return
    window.open(t.iframe.src, "_blank")
}

form.onsubmit = e => {
    e.preventDefault()
    if (urlInput.value.trim()) navigate(urlInput.value)
}

newTabBtn.onclick = () => createTab()

createTab()
</script>

</body>
</html>
